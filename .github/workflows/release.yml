name: "publish"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin' # Intel 芯片
            description: 'macOS Intel'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin' # Apple M 芯片
            description: 'macOS Silicon'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc' # Windows x64
            description: 'Windows x64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.description }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnm-dev libsoup2.4-dev

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          # 获取当前触发发版的标签
          CURRENT_TAG=${{ github.ref_name }}
          # 获取上一个标签，如果不存在则为空
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_TAG^ 2>/dev/null || echo "")
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## 更新内容 / What's Changed" >> $GITHUB_OUTPUT
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Getting all commits."
            git log --pretty=format:"- %s (%h)" $CURRENT_TAG >> $GITHUB_OUTPUT
          else
            echo "Generating changelog between $PREVIOUS_TAG and $CURRENT_TAG"
            git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..$CURRENT_TAG >> $GITHUB_OUTPUT
          fi
          
          echo "" >> $GITHUB_OUTPUT
          echo "> Generated by GitHub Actions" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_DEBUG: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OneSpace ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.target }}
